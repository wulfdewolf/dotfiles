general.import = ["~/.config/alacritty/catpuccin.toml"]

[env]
TERM = "screen-256color"

[window]
decorations = "buttonless"
dynamic_padding = true

[window.padding]
x = 0
y = 0

[font]
size = 14.0

[font.bold]
family = "JetBrainsMono Nerd Font"
style = "Heavy"

[font.bold_italic]
family = "JetBrainsMono Nerd Font"
style = "Heavy Italic"

[font.italic]
family = "JetBrainsMono Nerd Font"
style = "Medium Italic"

[font.normal]
family = "JetBrainsMono Nerd Font"
style = "Medium"
